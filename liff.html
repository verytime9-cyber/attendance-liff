<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>考勤打卡系統</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 16px; font-weight: 500; color: #555; line-height: 1.6; }
    .status.success { color: #28a745; }
    .status.error { color: #dc3545; }
    .progress { margin-top: 24px; display: flex; justify-content: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
    .dot.active { background: #667eea; }
    .dot.done { background: #28a745; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">📍</div>
    <div class="title" id="title">考勤打卡系統</div>
    <div class="subtitle" id="subtitle">正在為您處理打卡，請稍候...</div>
    <div class="loader" id="loader"></div>
    <div class="status" id="status">初始化中...</div>
    <div class="progress">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>
  </div>

  <script>
    // ⚠️【重要】請填入您的真實 LIFF ID
    const LIFF_ID = "2010371883-FlcDCDil";

    // ⚠️【重要】請填入您的  Cloudflare Worker 網址
    const POST_URL = "https://line-attendance-proxy.verytime9.workers.dev";

    const ACTION_LABELS = {
      clockin: "上班簽到",
      clockout: "下班簽退",
      fieldwork: "外勤打卡"
    };

    function setDot(step, state) {
      var dot = document.getElementById("dot" + step);
      if (dot) dot.className = "dot " + state;
    }

    function setStatus(msg, type) {
      document.getElementById("status").textContent = msg;
      document.getElementById("status").className = "status" + (type ? " " + type : "");
    }

    function showResult(success, title, msg) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("icon").textContent = success ? "✅" : "❌";
      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = msg;
      document.getElementById("status").textContent = success
        ? "3 秒後自動關閉視窗..."
        : "請關閉視窗後重試，或聯繫主管處理。";
      document.getElementById("status").className = "status " + (success ? "success" : "error");
      setDot(1, "done"); setDot(2, "done"); setDot(3, success ? "done" : "active");
      if (success) {
        setTimeout(function() { liff.closeWindow(); }, 3000);
      }
    }

    async function main() {
      try {
        // 步驟 1：初始化 LIFF
        setStatus("步驟 1/3：連接 LINE 身份驗證...");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // 取得使用者 UID
        var profile = await liff.getProfile();
        var uid = profile.userId;

        // 取得動作類型
        var urlParams = new URLSearchParams(window.location.search);
        var action = urlParams.get("action") || "clockin";
        var actionLabel = ACTION_LABELS[action] || "打卡";

        setDot(1, "done"); setDot(2, "active");

        // 步驟 2：取得 GPS（自動重試取最佳精度）
        setStatus("步驟 2/3：取得您的 GPS 定位...");

        // 第一次定位
        var position1 = await new Promise(function(resolve, reject) {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          });
        });

        var lat, lng, accuracy;

        // 如果第一次精度超過 200 公尺，靜默重試一次取更好的結果
        if (position1.coords.accuracy > 200) {
          setStatus("步驟 2/3：精確定位中，請稍候...");
          try {
            var position2 = await new Promise(function(resolve, reject) {
              navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
              });
            });
            // 取兩次裡精度較好的那一個
            if (position2.coords.accuracy < position1.coords.accuracy) {
              lat      = position2.coords.latitude;
              lng      = position2.coords.longitude;
              accuracy = Math.round(position2.coords.accuracy);
            } else {
              lat      = position1.coords.latitude;
              lng      = position1.coords.longitude;
              accuracy = Math.round(position1.coords.accuracy);
            }
          } catch (retryErr) {
            // 重試失敗就用第一次的結果
            lat      = position1.coords.latitude;
            lng      = position1.coords.longitude;
            accuracy = Math.round(position1.coords.accuracy);
          }
        } else {
          // 第一次精度已經夠好，直接用
          lat      = position1.coords.latitude;
          lng      = position1.coords.longitude;
          accuracy = Math.round(position1.coords.accuracy);
        }

        setDot(2, "done"); setDot(3, "active");
        setStatus("步驟 3/3：傳送打卡資料...");

        // 步驟 3：傳送給後端
        var payloadData = {
          liffData: {
            action: action,
            uid: uid,
            lat: lat,
            lng: lng,
            accuracy: accuracy
          }
        };
        var payloadString = JSON.stringify(payloadData);

        await new Promise(function(resolve, reject) {
          var xhr = new XMLHttpRequest();
          xhr.open("POST", POST_URL, true);
          xhr.setRequestHeader("Content-Type", "application/json");
          xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(xhr.responseText);
            } else {
              reject(new Error("伺服器回應錯誤：" + xhr.status));
            }
          };
          xhr.onerror = function() {
            reject(new Error("網路連線失敗"));
          };
          xhr.send(payloadString);
        });

        showResult(true, actionLabel + " 完成！", "打卡資料已成功送出，請查看 LINE 訊息確認結果。");

      } catch (err) {
        document.getElementById("loader").style.display = "none";

        if (err.code === 1) {
          showResult(false, "無法取得定位", "請至手機「設定 → LINE → 位置資訊」開啟定位權限後重試。");
        } else if (err.code === 2) {
          showResult(false, "定位服務異常", "請確認手機 GPS 已開啟，並在室外或靠近窗戶的位置重試。");
        } else if (err.code === 3) {
          showResult(false, "定位逾時", "GPS 訊號不穩，請移至戶外或靠近窗戶後重試。");
        } else {
          showResult(false, "系統錯誤", err.message || "未知錯誤，請截圖此畫面並聯繫系統管理員。");
        }
      }
    }

    main();
  </script>
</body>
</html>
