<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>考勤打卡系統</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 16px;
      font-weight: 500;
      color: #555;
      line-height: 1.6;
    }
    .status.success { color: #28a745; }
    .status.error { color: #dc3545; }
    .progress {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s;
    }
    .dot.active { background: #667eea; }
    .dot.done { background: #28a745; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">📍</div>
    <div class="title" id="title">考勤打卡系統</div>
    <div class="subtitle" id="subtitle">正在為您處理打卡，請稍候...</div>
    <div class="loader" id="loader"></div>
    <div class="status" id="status">初始化中...</div>
    <div class="progress">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2010371883-FlcDCDil";

    // 各動作的顯示文字對照
    const ACTION_LABELS = {
      clockin: "上班簽到",
      clockout: "下班簽退",
      fieldwork: "外勤打卡"
    };

    // 更新進度點
    function setDot(step, state) {
      var dot = document.getElementById("dot" + step);
      if (dot) {
        dot.className = "dot " + state;
      }
    }

    // 更新畫面狀態
    function setStatus(msg, type) {
      document.getElementById("status").textContent = msg;
      document.getElementById("status").className = "status" + (type ? " " + type : "");
    }

    // 顯示最終結果
    function showResult(success, title, msg) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("icon").textContent = success ? "✅" : "❌";
      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = msg;
      document.getElementById("status").textContent = success
        ? "3 秒後自動關閉視窗..."
        : "請關閉視窗後重試，或聯繫主管處理。";
      document.getElementById("status").className = "status " + (success ? "success" : "error");
      setDot(1, "done"); setDot(2, "done"); setDot(3, success ? "done" : "active");
      if (success) {
        setTimeout(function() { liff.closeWindow(); }, 3000);
      }
    }

async function main() {
  try {
    document.getElementById('subtitle').textContent = "初始化 LIFF...";
    await liff.init({ liffId: LIFF_ID });
    document.getElementById('subtitle').textContent = "LIFF 初始化完成";

    if (!liff.isLoggedIn()) {
      document.getElementById('subtitle').textContent = "導向登入...";
      liff.login();
      return;
    }

    document.getElementById('subtitle').textContent = "取得 LINE 身份...";
    var profile = await liff.getProfile();
    var uid = profile.userId;
    document.getElementById('subtitle').textContent = "UID 取得成功: " + uid.substring(0,8) + "...";

    var urlParams = new URLSearchParams(window.location.search);
    var action = urlParams.get("action") || "clockin";
    var actionLabel = ACTION_LABELS[action] || "打卡";
    document.getElementById('subtitle').textContent = "動作: " + actionLabel;

    setDot(1, "done"); setDot(2, "active");
    setStatus("步驟 2/3：取得您的 GPS 定位...");

    var position = await new Promise(function(resolve, reject) {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      });
    });

    var lat = position.coords.latitude;
    var lng = position.coords.longitude;
    var accuracy = Math.round(position.coords.accuracy);
    document.getElementById('subtitle').textContent = "GPS 成功: " + lat.toFixed(4) + ", " + lng.toFixed(4);

    setDot(2, "done"); setDot(3, "active");
    setStatus("步驟 3/3：傳送打卡資料...");

    var payload = {
      liffData: {
        action: action,
        uid: uid,
        lat: lat,
        lng: lng,
        accuracy: accuracy
      }
    };

    document.getElementById('subtitle').textContent = "傳送中... POST_URL: " + POST_URL.substring(0,30) + "...";

    var response = await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    document.getElementById('subtitle').textContent = "伺服器回應: " + response.status;

    if (!response.ok) {
      throw new Error("伺服器回應錯誤：" + response.status);
    }

    showResult(true, actionLabel + " 完成！", "打卡資料已成功送出，請查看 LINE 訊息確認結果。");

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('subtitle').textContent = "錯誤: " + (err.message || JSON.stringify(err)) + " (code: " + (err.code || "none") + ")";

    if (err.code === 1) {
      showResult(false, "無法取得定位", "請至手機「設定 → LINE → 位置資訊」開啟定位權限後重試。");
    } else if (err.code === 2) {
      showResult(false, "定位服務異常", "請確認手機 GPS 已開啟，並在室外或靠近窗戶的位置重試。");
    } else if (err.code === 3) {
      showResult(false, "定位逾時", "GPS 訊號不穩，請移至戶外或靠近窗戶後重試。");
    } else {
      showResult(false, "系統錯誤", err.message || "未知錯誤");
    }
  }
}

    main();
  </script>
</body>
</html>
